<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- SEO: 홈 페이지 메타 설명 -->
  <meta name="description" content="소울 컨트리 매칭, 전생 유형 테스트, 육아 성향 테스트, MBTI 캐릭터 테스트! 다양한 무료 심리 성향 테스트를 한 곳에서 즐겨보세요.">
  <title>테스트 연구소 - 글로벌 성향 & 심리 테스트 포털</title>
  <!-- 프리미엄 Pretendard 폰트 -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="style.css?v=20260630_v12_multipage">
</head>

<body>

  <!-- 모바일 최적화 폰 컨테이너 -->
  <div id="phone-container" class="phone-container">

    <!-- 포털 홈 화면 (테스트 목록 카드) -->
    <section id="home-screen" class="screen active">

      <!-- 테스트 카드 목록 (script-home.js에서 링크 카드로 자동 렌더링) -->
      <div id="test-list-container" class="test-list-container">
      </div>

      <div class="portal-footer">
        <p data-i18n="portal_footer">© 2026 테스트 연구소. All rights reserved.</p>
        <div class="footer-links">
          <a href="#" id="link-privacy">개인정보 처리방침</a> |
          <a href="#" id="link-terms">이용 약관</a> |
          <a href="#" id="link-disclaimer">면책 조항</a>
        </div>
      </div>
    </section>

  </div>

  <!-- 정책 고지 모달 -->
  <div id="policy-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title" style="margin:0; font-size:1.3rem; font-weight:800; color:var(--color-text-main);">정책 약관</h2>
        <button id="close-modal" class="btn-close"
          style="background:none; border:none; font-size:1.8rem; cursor:pointer; color:#B0A596;">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"
        style="max-height:60vh; overflow-y:auto; padding:15px 0; font-size:0.95rem; line-height:1.6; color:#5C544C;">
        <!-- 동적 텍스트 로드 -->
      </div>
    </div>
  </div>

  <!-- 테스트 목록 색인 (카드 렌더링에 사용) -->
  <script src="tests-data/tests-registry.js?v=20260630_v13_ampfix"></script>
  <!-- 홈 전용 스크립트 (카드→링크 렌더링, 정책 모달) -->
  <script src="script-home.js?v=20260630_v13_ampfix"></script>

</body>

</html>
